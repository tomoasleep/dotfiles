# Starship configuration for servers - minimal profile
# Plain text symbols, no nerd fonts
"$schema" = 'https://starship.rs/config-schema.json'

format = """$directory$git_branch$git_state$character"""

# No newline between prompts for compact display
add_newline = false

[directory]
truncation_length = 4
truncation_symbol = ".../"
truncate_to_repo = false
read_only = " ro"

[git_branch]
symbol = ""
truncation_symbol = "..."

[git_state]
format = " [$state] "

[character]
success_symbol = ">"
error_symbol = "x"

